name: app

on:
  push:
  pull_request:

# The backend suite runs in backend-tests.yml (3.11 + 3.12 matrix); this
# workflow covers what that one does not: the frontend build and the images.
jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build (tsc strict + vite)
        working-directory: frontend
        run: |
          npm ci
          npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t futk-backend:ci .
      - name: Build frontend image
        run: docker build -t futk-frontend:ci ./frontend
